services:
  llama-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Pin to a release tag (e.g. b4400) for reproducible builds if desired.
        LLAMA_CPP_REF: ${LLAMA_CPP_REF:-master}
    image: llama-cpp-cuda-sm70:local
    container_name: llama-server
    restart: unless-stopped

    # Expose both V100s to the container.
    gpus: all

    ports:
      - "8000:8000"

    environment:
      # Use both GPUs, index 0 and 1.
      NVIDIA_VISIBLE_DEVICES: "0,1"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
      CUDA_VISIBLE_DEVICES: "0,1"

      # Optional: HF token to avoid download rate limits / for gated repos.
      HF_TOKEN: ${HF_TOKEN}

      # Where -hf downloads are cached (mapped to a named volume below).
      LLAMA_CACHE: /root/.cache/llama.cpp

      # If P2P/NVLink copies misbehave on your box, set this to "1" (slower):
      # GGML_CUDA_NO_PEER_COPY: "0"

    volumes:
      - llama-cache:/root/.cache/llama.cpp

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 30
      # First run downloads ~23 GB (Q5_K_M); give it plenty of time.
      start_period: 1800s

    command:
      # ----- model: GGUF auto-downloaded from Hugging Face -----
      - -hf
      - ${MODEL_REPO}:${MODEL_QUANT}
      # Short, stable name exposed via the OpenAI API ("model" field).
      - --alias
      - ${MODEL_ALIAS}

      # ----- network / OpenAI-compatible API -----
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      # Tool/function calling for coding agents (Continue, Cline, etc.).
      # Qwen2.5-Coder uses the Hermes 2 Pro tool-call format via its GGUF
      # chat template; without --jinja calls leak as plain text in the reply.
      - --jinja
      - --api-key
      - ${API_KEY:-local-key}

      # ----- GPU / multi-GPU -----
      # Offload ALL transformer layers to GPU (no CPU offload). 99 = "all".
      - -ngl
      - "99"
      # Split the model evenly across the two V100s (balanced VRAM).
      - -ts
      - "1,1"
      # Split mode:
      #   layer (default here) -> split by layers, lowest inter-GPU traffic, best
      #                           single-stream throughput.
      #   row                  -> split tensors across GPUs (tensor-parallel-like),
      #                           uses NVLink heavily; try it for latency.
      - -sm
      - layer

      # ----- context / batching -----
      # Qwen2.5-Coder-32B native context is 32768. Plenty of VRAM headroom here.
      - -c
      - "32768"
      # Single full-context slot (good for coding agents). Raise for concurrency.
      - -np
      - "1"
      - --cont-batching
      - --metrics

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    depends_on:
      llama-server:
        condition: service_healthy

    ports:
      - "3000:8080"

    environment:
      OPENAI_API_BASE_URL: http://llama-server:8000/v1
      OPENAI_API_KEY: local-key
      # Convenient for local testing. Enable auth if exposed externally.
      WEBUI_AUTH: "false"

    volumes:
      - open-webui-data:/app/backend/data

volumes:
  llama-cache:
  open-webui-data:
